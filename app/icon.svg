<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background — cream paper, matches the app palette (#FAF7F2) -->
  <rect width="64" height="64" rx="14" fill="#FAF7F2"/>
  <!-- Speech bubble with a chat-tail at bottom-left, drawn in gold -->
  <path
    fill="none"
    stroke="#B8924A"
    stroke-width="3.4"
    stroke-linejoin="round"
    stroke-linecap="round"
    d="
      M 18 12
      L 46 12
      A 6 6 0 0 1 52 18
      L 52 38
      A 6 6 0 0 1 46 44
      L 28 44
      L 18 53
      L 21 44
      L 18 44
      A 6 6 0 0 1 12 38
      L 12 18
      A 6 6 0 0 1 18 12
      Z
    "
  />
  <!-- Latin cross centered in the bubble -->
  <g fill="none" stroke="#B8924A" stroke-width="3.4" stroke-linecap="square">
    <line x1="32" y1="18" x2="32" y2="38"/>
    <line x1="25" y1="24" x2="39" y2="24"/>
  </g>
</svg>
